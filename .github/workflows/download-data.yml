name: Download daily GDELT data

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC — previous day's GDELT data is fully available
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml newspaper3k sumy nltk numpy

      - name: Download yesterday's GDELT data
        run: |
          DATE=$(date -u -d "yesterday" +%Y%m%d)
          echo "Downloading data for $DATE"
          python scripts/download_events.py $DATE
          
      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/points_data/ docs/goldstein_data/ docs/mb_data/ docs/final_data/
          git diff --cached --quiet && echo "No new data" || \
            git commit -m "data: add GDELT data for $(date -u -d yesterday +%Y-%m-%d)" && \
            git push
